<div class="user-main">
    <p (click)="userClicked()">user-card works!</p>
    <p>{{_user._id}}</p>
    <p>{{_user.email}}</p>
    <p>{{_user.name}}</p>
    <p>{{_user.created_at}}</p>
    <p>{{_user.address}}</p>
    <p>{{_user.city}}</p>
    <p>{{_user.birthday}}</p>
    <p>{{_user.phone_number}}</p>
    <p>{{_user.role}}</p>
    <img src={{_image_path_user}} alt={{_user.avatar_path}} />
</div>
